		<p>
			你需要有好友或者项目（自己创建的项目）
		</p>
		<h3>删除文件夹</h3>
		<p>在项目中的图纸管理中，通过点击文件夹右侧的更多icon或者长按进入文件夹详情，在文件夹详情点击“删除”，即可实现文件夹的删除。<br /><br />
			<b>说明：</b>删除文件夹只有项目创建者（负责人）可以使用，删除后不可恢复且释放占有的云图空间。</p>
