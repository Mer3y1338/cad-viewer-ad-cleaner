	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../../link.html">帮助</a></li>
				<li>&gt;</li>
				<li><a href="../../DwgChat.html">项目</a></li>
				<li>&gt;</li>
				<li class="active">创建文件夹</li>
			</ul>
		</div>
		<div class="item-title">创建文件夹</div>
		<h3>前提条件</h3>
		<p>
			你需要有项目（自己创建的项目和加入的项目），且已经上传了图纸。
		</p>
		<h3>创建文件夹</h3>
		<p>
			<b>[第1步]</b><br />
			点击Tab下导航中的「项目」进入项目列表。
		</p>
		<p>
			<b>[第2步]</b><br />
			选择一个项目，并进入项目详情中的图纸管理。
		</p>
		<p>
			<b>[第3步]</b><br />
			在图纸管理中，点击右上角的“+”输入文件夹名称后即可创建文件夹。
		</p>
		<h3>说明</h3>
		<p>
			1、目前只有项目中支持创建文件夹，单聊中暂不支持文件夹的创建。<br />
			2、只有负责人有创建文件夹的权限，成员没有创建文件夹的权限。<br />

		</p>
