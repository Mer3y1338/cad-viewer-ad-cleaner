		<h3>前提条件</h3>
		<p>
			你需要有好友或者项目（自己创建的项目和加入的项目）且已经上传了图纸
		</p>
		<h3>重命名文件夹</h3>
		<p>在项目中的图纸管理中，通过点击文件夹右侧的更多icon或者长按进入文件夹详情，在文件夹详情点击“重命名”，即可实现文件夹的重命名。<br /><br />
			<b>说明：</b>重命名文件夹只有项目创建者（负责人）可以使用。</p>
