		<div class="item-title">删除图纸</div>
		<h3>前提条件</h3>
		<p>
			你需要有项目（自己创建的项目）或者好友且已经上传了图纸。
		</p>
		<h3>删除图纸</h3>
		<p>
			<b>[第1步]</b><br />
			依次点击下导航的Tab「项目」，进入项目列表后，选择一个项目并进入项目。
		</p>
		<p>
			<b>[第2步]</b><br />
			进入项目后，在「图纸管理」Tab，点击查看某一图纸详情，进入图纸详情页面。
		</p>
		<p>
			<b>[第3步]</b><br />
			在详情页面中点击“删除”，即可实现图纸删除。<br />
		</p>
		<p>
			<b>说明：</b>删除图纸只有项目创建者（负责人）或者是单聊中上传者可以使用，删除后图纸不可恢复且释放占有的云图空间。</p>
