		<title>上传图纸</title>
		<meta charset="utf-8">
		<meta http-equiv="x-ua-compatible" content="ie=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<link rel="stylesheet" type="text/css" href="../../menu.css"/>
		<script type="text/javascript" src="../../common.js"></script>
	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../../link.html">帮助</a></li>
				<li>&gt;</li>
				<li><a href="../../DwgChat.html">项目</a></li>
				<li>&gt;</li>
				<li class="active">上传图纸</li>
			</ul>
		</div>
		<div class="item-title">上传图纸</div>
		<h3>前提条件</h3>
		<p>
			你需要有项目（自己创建的项目和加入的项目）或者好友
		</p>
		<h3>上传图纸</h3>
		<p>
			<b>[第1步]</b><br />
			依次点击下导航的Tab「项目」，进入项目列表后，选择一个项目并进入项目。
		</p>
		<p>
			<b>[第2步]</b><br />
			进入项目后，在「图纸管理」Tab，点击上传图纸按钮后弹出选择图纸来源。
		</p>
		<p>
			<b>[第3步]</b><br />
			选择一个图纸后即可完成上传。
		</p>
		
		<p>此外想要上传图纸还可以使用<a href="../GroupChat/SendDwgToGroup.html">发送图纸到项目中</a>。</p>
