		<div class="item-title">搜索添加好友</div>
		<h3>1.搜索好友</h3>
		<p>
			进入项目，依次点击「右上角通讯录图标」-「右上角添加好友图标」 -「搜索框」 输入好友的手机号或者邮箱后点击搜索按钮。然后会显示搜索到的好友信息，在这里你可以设置好友的备注信息。
		</p>
		<h3>2.添加好友</h3>
		<p>
			在搜索到的好友信息页面点击“添加到通讯录”按钮，填写完验证申请信息后点击“发送”按钮完成好友的添加。添加完成后需要等待好友通过验证后才能建立好友关系。
		</p>
