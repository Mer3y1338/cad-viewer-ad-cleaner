		<div class="item-title">添加通讯录好友</div>
		<h3>1.访问手机通讯录</h3>
		<p>
			进入项目，依次点击「右上角通讯录图标」-「右上角添加好友图标」 -「手机联系人」 此处需要你允许CAD看图王访问你的手机通讯录。然后将显示你手机通讯录中的用户列表。
		</p>
		<h3>2.添加好友</h3>
		<p>
			在通讯录的好友列表中选择你要加为好友的用户点击“加好友”按钮，完成添加好友申请。申请完成后需要等待好友通过验证后才能建立好友关系。你可以用其他方式通知好友下载最新的CAD看图王，并通过您的验证申请。
		</p>
