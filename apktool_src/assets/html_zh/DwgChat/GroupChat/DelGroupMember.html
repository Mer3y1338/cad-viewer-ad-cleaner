		<div class="row breadcrumb-wrapper">

				<li class="active">删除项目成员</li>
			</ul>
		</div>
		<div class="item-title">删除项目成员</div>
		<h3>前提条件</h3>
		<p>
			你需要通过<a href="./CreatGroupChat.html">创建项目</a>创建了项目，此功能只有创建者（负责人）可使用。
		</p>
		<h3>删除项目成员</h3>
		<p>
			<b>[第1步]</b><br />
			依次点击下导航的Tab「项目」，进入项目列表后，选择一个项目并进入项目。
		</p>
		<p>
			<b>[第2步]</b><br />
			进入项目后，切换到「项目成员」Tab，点击删除成员按钮,进入选择删除项目成员页面。
		</p>
		
		<p>
			<b>[第3步]</b><br />
			在选择删除项目成员页面选择要删除的成员后点击「完成」按钮完成删除项目成员。
		</p>
		
		<p>
			<b>说明：</b>删除成员后，被删除成员上传的图纸统一归属负责人，并且无法再进入此项目。
			
		</p>
