	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../../link.html">帮助</a></li>
				<li>&gt;</li>
				<li><a href="../../DwgChat.html">项目</a></li>
				<li>&gt;</li>
				<li class="active">修改项目名称</li>
			</ul>
		</div>
		<div class="item-title">修改项目名称</div>
		<h3>前提条件</h3>
		<p>
			你需要通过<a href="./CreatGroupChat.html">创建项目</a>创建了项目。修改项目名称功能只有项目创建者（负责人）可以使用。
		</p>
		
		<h3>修改项目名称</h3>
		<p>
			<b>[第1步]</b><br />
			依次点击Tab下导航中的「项目」-「选择项目」-「进入项目详情」-「右上角更多」进入项目设置页面。
		</p>
		<p>
			<b>[第2步]</b><br />
			在项目设置页面点击「项目名称」一栏，进入修改项目名称页面。
		</p>
		<p>
			<b>[第3步]</b><br />
			在修改项目名称页面输入新的项目名称后,点击「完成」按钮完成项目名称的修改。
		</p>
		<p>
			<b>说明：</b>只有负责人有修改项目名称权限。<br /><br />
		</p>
