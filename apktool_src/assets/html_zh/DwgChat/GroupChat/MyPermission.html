		<div class="item-title">我的权限</div>
		<h3>前提条件</h3>
		<p>
			你需要通过<a href="./CreatGroupChat.html">创建项目</a>创建了项目或者已经加入到某一项目中。项目创建者（负责人）及项目内的成员都可以查看在项目中能使用的功能。
		</p>
		
		<h3>我的权限</h3>
		<p>
			<b>[第1步]</b><br />
			依次点击Tab下导航中的「项目」-「选择项目」-「进入项目详情」-「右上角更多」进入项目设置页面。
		</p>
		<p>
			<b>[第2步]</b><br />
			在项目设置页面点击「我的权限」一栏，进入我的权限页面。在我的权限页面可以看到当前可使用的功能。
		</p>
		
		<p>
			<b>说明：</b>成员权限可通过负责人进行设置。
		</p>
