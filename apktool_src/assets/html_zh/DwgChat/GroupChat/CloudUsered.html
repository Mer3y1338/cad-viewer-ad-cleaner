		<div class="item-title">项目空间使用情况</div>
		<h3>前提条件</h3>
		<p>
			你需要通过<a href="./CreatGroupChat.html">创建项目</a>创建了项目或者已经加入到某一项目中。项目创建者（负责人）及项目内的成员都可以查看项目空间使用情况。
		</p>
		
		<h3>项目空间使用情况</h3>
		<p>
			<b>[第1步]</b><br />
			依次点击Tab下导航中的「项目」-「选择项目」-「进入项目详情」-「右上角更多」进入项目设置页面。
		</p>
		<p>
			<b>[第2步]</b><br />
			在项目设置页面中的「项目空间使用情况」中显示此项目所有图纸的空间占用情况。
		</p>
		<p>
			<b>说明：</b>此数值表示当前项目所占用负责人的云图空间大小。<br /><br />
		</p>
