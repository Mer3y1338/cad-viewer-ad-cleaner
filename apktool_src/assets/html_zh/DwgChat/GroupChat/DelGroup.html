		<div class="item-title">解散项目</div>
		<h3>前提条件</h3>
		<p>
			首先你需要通过<a href="./CreatGroupChat.html">创建项目</a>创建了项目。解散项目功能只有项目创建者（负责人）可以使用。
		</p>
		
		<h3>解散项目</h3>
		<p>
			<b>[第1步]</b><br />
			依次点击Tab下导航中的「项目」-「选择项目」-「进入项目详情」-「右上角更多」进入项目设置页面。
		</p>
		<p>
			<b>[第2步]</b><br />
			在项目设置页面点击「解散项目」按钮，弹出解散项目提示。
		</p>
		<p>
			<b>[第3步]</b><br />
			根据需要选择相应的解散方式完成解散项目。
		</p>
		<p>
			<b>说明：</b><br />
			备份图纸后解散：系统会将项目中最新的图纸保存到你的云图空间根目录下。<br /><br />
			直接解散：所有图纸都将被删除并释放你的云图空间。<br /><br />
		
		</p>
