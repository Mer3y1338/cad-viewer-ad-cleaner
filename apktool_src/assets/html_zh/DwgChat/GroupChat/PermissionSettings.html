		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">

				<li><a href="../../DwgChat.html">项目</a></li>

			</ul>
		</div>
		<div class="item-title">项目成员权限设置</div>
		<h3>前提条件</h3>
		<p>
			你需要通过<a href="./CreatGroupChat.html">创建项目</a>创建了项目。项目成员权限设置功能只有项目创建者（负责人）可以使用。
		</p>
		
		<h3>项目成员权限设置</h3>
		<p>
			<b>[第1步]</b><br />
			依次点击下导航的Tab「项目」，进入项目列表后，选择一个项目并进入项目。
		</p>
		<p>
			<b>[第2步]</b><br />
			进入项目后，切换到「项目成员」Tab，点击要设置权限的成员。
		</p>
		<p>
			<b>[第3步]</b><br />
			在弹出的权限设置菜单中，选择为该成员设置的权限。成员权限在未修改情况下默认是查看权限。
		</p>
		<p>
			<b>说明：</b>只有负责人有项目成员权限设置权限。<br /><br />
		</p>
