		<div class="item-title">退出项目</div>
		<h3>前提条件</h3>
		<p>
			你需要加入到某一项目中,且只有项目内的成员可以使用此功能。
		</p>
		<h3>退出项目</h3>
		<p>
			<b>[第1步]</b><br />
			依次点击Tab下导航中的「项目」-「选择项目」-「进入项目详情」-「右上角更多」进入项目设置页面。
		</p>
		<p>
			<b>[第2步]</b><br />
			在项目设置页面点击「退出项目」按钮弹出退出项目提示，选择确定后完成退出项目。
		</p>
		<p>
			<b>说明：</b>成员退出项目后，成员上传的图纸统一归属负责人。该成员将无法再进入此项目。<br /><br />
		</p>
