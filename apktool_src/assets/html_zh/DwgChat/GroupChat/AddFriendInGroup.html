			</ul>

		<div class="item-title">加成员进项目</div>
		<h3>前提条件</h3>
		<p>
			你需要通过<a href="./CreatGroupChat.html">创建项目</a>创建了项目或者已经加入到某一项目中。对于普通项目，项目创建者（负责人）及项目内的成员都可以将自己的好友、看图王用户加入到自己所在的项目中。
		</p>
		<h3>加成员进项目</h3>
		<p>
			<b>[第1步]</b><br />
			依次点击下导航的Tab「项目」，进入项目列表后，选择一个项目并进入项目。
		</p>
		<p>
			<b>[第2步]</b><br />
			进入项目后，切换到「项目成员」Tab，点击添加成员按钮，进入添加项目成员页面。
		</p>
		<p>
			<b>[第3步]</b><br />
			在添加项目成员页面可选择通过搜索、手机通讯录、看图王好友等方式加人进项目。加人进项目无需对方验证，可直接将对方加进项目。
		</p>
