		</p>
		<h3>自主看图</h3>
		<p>切换到自主看图将不受操作人的操作影响，可以任意更换图纸，操作图纸。所做的操作也不会影响其他用户。</p>
		<p>
			首先通过<a href="./EnterShareDwgChat.html">进入共享聊图</a>先进入共享聊图，然后点击「切换到自主看图」按钮进入自主看图。<br /><br />
			<b>说明：</b>自主看图成员不受操作人的操作影响，不同步显示操作人的操作，可以随意看图。自主看图成员想成为操作人需要先切换到<a href="./ShareViewDwg.html">共享看图</a>然后再通过<a href="./BecomeOperator.html">成为操作人</a>功能成为操作人。<br />
