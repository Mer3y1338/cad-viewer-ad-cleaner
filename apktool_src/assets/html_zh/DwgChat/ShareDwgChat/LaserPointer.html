		<h3>激光笔</h3>
		<p>激光笔是一个可快速指示图纸要沟通位置的工具，只有操作人可以使用激光笔，可以让激光笔显示和隐藏。</p>
		<p>
			在共享看图页面中点击“激光笔”按钮。再次点击则隐藏激光笔。<br /><br />
			<b>说明：</b>只有操作人可以使用激光笔功能，操作人对激光笔的显示隐藏及移动都将同步在其他成员界面中显示。<br />
