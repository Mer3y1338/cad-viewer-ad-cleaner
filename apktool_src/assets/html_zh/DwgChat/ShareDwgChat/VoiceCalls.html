		<div class="item-title">语音通话</div>
		<h3>前提条件</h3>
		<p>
			你需要有好友或者项目（自己创建的项目和加入的项目）。
		</p>
		<h3>语音通话</h3>
		<p>在单聊或者项目的共享聊图中过程，为了方便沟通，可以选择开启语音通话。开启语音通话的用户间可以像打电话一样听到大家说的话。</p>
		<p>
			<br />
			<b>说明：</b>每个用户每个月的语音通话时长由系统根据会员的类型进行分配，你可以在会员信息页面查看语音通话的使用情况。
			语音通话时长用尽后，将不能开启语音通话功能，但不影响项目其他功能的使用。<br />
		</p>
