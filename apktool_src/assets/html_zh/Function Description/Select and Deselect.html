		<p><strong>选择与弃选</strong> </p>
		<p>在编辑模式下，可选择对象并编辑。选择方式如下：<br />
			<strong>点选：</strong>点击实体即可选择该实体，连续点击可将点击的多个实体放入一个选择集中。<br />
			<strong>窗选：</strong>单击并从左到右拖拽窗口，可以选定完全位于所定义矩形区域内的实体。<br />
			<strong>窗交：</strong>单击并从右到左拖拽窗口，可以选定部分位于所定义矩形区域内的实体。<br />
			<strong>选择集：</strong>被选中实体的集合。通过单击，或单击并拖动来定义矩形区域可以选择多个对象。<br />
			<strong>弃选：</strong>点击已选中实体为弃选该实体，点击屏幕空白处为弃选当前选择集。</p>
