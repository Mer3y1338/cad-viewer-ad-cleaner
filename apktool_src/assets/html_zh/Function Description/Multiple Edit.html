		<div class="item-title">编辑多个实体</div>
		<p><strong>一、简单编辑</strong></p>
		<p>选中多个实体时，所有实体被一个外包矩形包围，外包矩形四个角点处显示夹点，中心处显示平移图标，右侧显示旋转图标。<br />
			可拖动任一夹点，整体缩放选择集。<br />
			可拖动平移图标，整体平移选择集。<br />
			可拖动旋转图标，整体旋转选择集。</p>
		<p><strong>二、菜单编辑 </strong></p>
		<p>编辑菜单上显示：<a href="../Command Reference/Text_height.html">字高</a>，<a href="../Command Reference/Delete.html">删除</a>，<a href="../Command Reference/Copy.html">复制</a>，<a href="../Command Reference/Move.html">移动</a>，<a href="../Command Reference/Rotate.html">旋转</a>，<a href="../Command Reference/Mirror.html">镜像</a>，<a href="../Command Reference/Scale_base_point.html">缩放</a>，<a href="../Command Reference/Edit Color.html">颜色</a>，和<a href="../Command Reference/Linetype.html">线型</a>。具体操作参考各个命令链接。</p>
