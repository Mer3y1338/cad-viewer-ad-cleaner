		<p>模拟鼠标可防止手指遮挡视线造成误操作。<br />
			默认设置为开启，执行相关命令时，手指长按屏幕，手指上方显示十字形的模拟鼠标，手指点输入改为十字光标点输入。<br />
			可在&ldquo;设置&rdquo;中，设置模拟鼠标开启和关闭。支持绘制过程中模拟鼠标的开和关。 </p>
