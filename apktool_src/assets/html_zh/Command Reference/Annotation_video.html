<!DOCTYPE html>
<html>
	<head>
		<title>视频</title>
		<meta charset="utf-8">
		<meta http-equiv="x-ua-compatible" content="ie=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<link rel="stylesheet" type="text/css" href="../menu.css" />
		<script type="text/javascript" src="../common.js"></script>
	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">视频</li>
			</ul>
		</div>
		<div class="item-title">视频</div>
		<p><img src="../images/Annotation_video.png" alt="" width="28" height="28" /></p>
		<p>批注 → 视频 </p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：点击&ldquo;批注&rdquo;按钮，选择&ldquo;视频&rdquo;工具;</p>
		<p>
			步骤2：点击屏幕指定一点放置图片视频。 </p>
		<p>
			步骤3：进入视频拍摄页面，支持拍摄一段60s以内的视频。</p>
		<p>
			步骤4：拍摄完成后进入视频列表页，点击视频可预览拍摄结果，支持继续添加视频（如未满10张）、替换视频、删除视频，及添加备注。</p>
		<p>
			步骤5：点击&ldquo;确定&rdquo;完成。 </p>


		

	</body>
</html>
