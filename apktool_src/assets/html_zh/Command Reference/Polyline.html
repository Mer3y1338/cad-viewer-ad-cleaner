	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">多段线</li>
			</ul>
		</div>
		<div class="item-title">多段线</div>
		<p><img src="../images/Polyline-001.png" alt="" width="28" height="28" /></p>
		<p>
			绘图 → 多段线 </p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：点击&ldquo;绘图&rdquo;按钮，再选择&ldquo;多段线&rdquo;工具。 </p>
		<p>
			步骤2：在屏幕上点击或拖动指定第一点，手指抬起时拾取的点为所指定的点。 </p>
		<p>
			步骤3调整第一点或创建下一点。如需绘制圆弧，点击关键字&ldquo;弧&rdquo;。</p>
		<p>
			步骤4：重复步骤3，调整当前点创建。当选择的点数超过两个点时，关键字会增加&ldquo;闭合&rdquo;，可用来闭合多段线并结束当前多段线命令。 </p>
		<p>
			步骤5：如需取消上一步操作，可点击&ldquo;撤销&rdquo;。</p>
		<p>
			步骤6：调整当前点或确认输入。 </p>
<p>
			小技巧：多段线命令在指定下一点时，当夹角接近垂直时触发贴靠效果，可方便画出直角。 </p>
