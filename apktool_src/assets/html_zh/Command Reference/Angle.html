<!DOCTYPE html>
<html>
	<head>
		<title>测角度</title>
		<meta charset="utf-8">
		<meta http-equiv="x-ua-compatible" content="ie=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<link rel="stylesheet" type="text/css" href="../menu.css" />
		<script type="text/javascript" src="../common.js"></script>
	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">测角度</li>
			</ul>
		</div>
		<div class="item-title">测角度</div>
		<p><img src="../images/Angle.png" alt="" width="28" height="28" /></p>
		<p>
			测量 → 测角度 </p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：单击工具条上的&ldquo;测量&rdquo;按钮，弹出的面板上选择&ldquo;测角度&rdquo;命令； </p>
		<p>
			步骤2：根据命令提示指定角的第一个端点； </p>
		<p>
			步骤3：指定角度顶点；</p>
		<p>
			步骤4：指定角度第二个端点。 </p>
		<p>角度值按照从第一个端点转到第二个端点逆时针方向的角度值来显示。<br />
			结果显示遵循精度中角度类型，精度的设置。 勾选精度中的&ldquo;顺时针&rdquo;时，角度值按照从第一个端点到第二个端点顺时针方向的角度显示。 </p>
		


	</body>
</html>
