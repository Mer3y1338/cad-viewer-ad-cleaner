		<div class="item-title">新建图块</div>

		
		
		<p>
			新建图块：支持把选定图形组合成图块。</p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：启动&ldquo;插入图块&rdquo;功能； </p>
		<p>
			步骤2：在&ldquo;我的图块库&rdquo;或&ldquo;当前图纸&rdquo;下均可看到&ldquo;新建图块&rdquo;功能入口； </p>
		<p>
			步骤3：指定完图块名称后，点击&ldquo;确定&rdquo;则提示：指定插入基点。在图纸上指定图块的插入基点。</p>
		<p>
			步骤4：指定完插入基点后，提示：选择组成块的对象。可点击或框选组成图块的对象，选择完毕后点击右上角的&ldquo;√&rdquo;则创建图块完成。 </p>
<p>说明：若选择的对象中包含属性定义，则会在选择对象完成后指定属性值。</p>
