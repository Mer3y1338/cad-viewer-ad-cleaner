	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">测弧长</li>
			</ul>
		</div>
		<div class="item-title">测弧长</div>
		<p><img src="../images/Arc length.png" alt="" width="28" height="28" /></p>
		<p>
			测量 → 测弧长</p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：单击工具条上的&ldquo;测量&rdquo;按钮，弹出的面板上选择&ldquo;测弧长&rdquo;命令，弹出测长度面板。</p>
		<p>
			步骤2：单击或拖动指定圆弧的起点，手指抬起时拾取的点为测量的起点。</p>
		<p>
			步骤3：单击或拖动指定圆弧的端点。 </p>
		<p>步骤4：单击或拖动指定圆弧上一点。 </p>
		<p> 步骤5：面板中显示圆弧的半径，总角度，弧长和弦长；可在结果框内长按，选择&ldquo;复制&rdquo;复制测量结果。</p>
		<p> 步骤6：点击面板上的&ldquo;×&rdquo;或命令提示语后的&ldquo;×&rdquo;关键字可结束命令。 </p>
		

	</body>
</html>
