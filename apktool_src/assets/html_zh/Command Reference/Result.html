<!DOCTYPE html>
<html>
	<head>
		<title>看结果</title>
		<meta charset="utf-8">
		<meta http-equiv="x-ua-compatible" content="ie=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<link rel="stylesheet" type="text/css" href="../menu.css" />
		<script type="text/javascript" src="../common.js"></script>
	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">看结果</li>
			</ul>
		</div>
		<div class="item-title">看结果</div>
		<p>
			<img src="../images/Result 1.png" alt="" width="28" height="28" />
		</p>
		<p>
			测量结果按照测量的先后顺序排列。</p>
		<p>

			<div style="width:40%;margin:0 auto;">
				<img src="../images/Result 2.png" alt="" style='width:100%;display:block;' />
			</div>
		</p>
		<p>
			<strong>重命名：</strong><br />
			点击首列名称，可修改该名称。<br />
			<strong>删除数据：</strong><br />
			点击该行末尾的&ldquo;删除&rdquo;按钮即可删除该行数据。<br />
			<strong>全部清除：</strong><br />
			点击&ldquo;全部清除&rdquo;按钮删除当前页面的所有测量结果。<br />
			<strong>导出</strong>：<br />
			点击&ldquo;导出&rdquo;按钮可将当前测量结果导出为&ldquo;简单结果&rdquo;和&ldquo;详细结果&rdquo;。默认文件名为：测量结果_日期.txt，可修改该文件名。点击&ldquo;确定&rdquo;后可分享测量结果。
		</p>

		<!-- <p class="goback"><a href="#" onclick="javascript:goBack();">返回</a></p> -->

	</body>
</html>
