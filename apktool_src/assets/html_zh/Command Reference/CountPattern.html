<!DOCTYPE html>
<html>
	<head>
		<title>图形查找</title>
		<meta charset="utf-8">
		<meta http-equiv="x-ua-compatible" content="ie=edge">

		<link rel="stylesheet" type="text/css" href="../menu.css" />
		<script type="text/javascript" src="../common.js"></script>
	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">图形查找</li>
			</ul>
		</div>
		<div class="item-title">图形查找</div>
		<p><img src="../images/Find_Graphic.png" alt="" width="28" height="28" /></p>
		<p>
			工具箱 → 图形查找 </p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：点击&ldquo;工具箱&rdquo;按钮，选择&ldquo;图形查找&rdquo;工具。</p>
		<p>
			步骤2：根据命令提示选择要查找的对象，可以是一个对象，也可以是多个对象。</p>
		<p>
			步骤3：对象选择完成后，点击右上角的&ldquo;√&rdquo;，则查找结果显示在结果列表中。 </br>
支持修改查找范围，可在框选范围内查找指定对象（支持矩形窗口和异形窗口范围）。</br>
支持在结果列表中点击某一条结果，视图则跳转并定位到该对象所在位置。
		 </p>
		


	</body>
</html>
