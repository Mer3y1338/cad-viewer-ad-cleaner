		<div class="item-title">编辑文字</div>
		<p><img src="../images/EditingText.png" alt="" width="28" height="28" /></p>


		<p>编辑 → 编辑文字 </p>
		<p>操作步骤： </p>
		<p>步骤1：选中需要修改的文字，点击&ldquo;编辑文字&rdquo;选项。 </p>
		<p>步骤2：弹出的文字编辑框中修改当前文本。可输入多行文字，可换行。 </p>
		<p>步骤3：点击&ldquo;✓&rdquo;确认修改并退出。点击&ldquo;返回&rdquo;取消修改并退出。 </p>
		<p>注：选中标注后，可用该命令修改标注的文字。 </p>
