	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">批注查找</li>
			</ul>
		</div>
		<div class="item-title">批注查找</div>
		<p><img src="../images/Annotation_find.png" alt="" width="28" height="28" /></p>
		<p>工具箱 → 批注查找 </p>
		<p>
			<b>操作步骤： </b>
		</p>
		<p>
			步骤1：启动&ldquo;批注查找&rdquo;功能;</p>
		<p>
		步骤2：设置筛选条件，初始状态下默认查找全部类型的批注，在全部时间范围内，全部创建人，全图范围，点击&ldquo;查询&rdquo;即可开始查找全部批注；可以设置批注类型，时间范围，创建人和图纸范围； </p>
		<p>
		步骤3：点击&ldquo;查找&rdquo;后，筛选条件面板收起，下方展示查找结果列表，结果列表中第一项处于选中状态，屏幕中显示该项的视图位置。</p>
		<p>步骤4：在结果列表中点击一项，视图将跳转并定位到该项的位置。</p>

		

	</body>
</html>
