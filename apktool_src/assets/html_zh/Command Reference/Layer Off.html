		<p><img src="../images/Layer Off.png" alt="" width="28" height="28" /></p>
		<p>
			图层 → 关闭图层 </p>
		<p>
			选择图层，即可关闭，支持多选。 </p>
		<p>
			操作流程：<br />
			Step 1： 启动&ldquo;关闭图层&rdquo;命令，提示&ldquo;选择对象&rdquo;；<br />
			Step 2：选择一个对象后，立即关闭该图层，可点击关键字撤销上一个已选对象。支持框选，也可连续选择多个对象。<br />
			Step 3：点击关键字&ldquo;✓&rdquo;结束命令。</p>
