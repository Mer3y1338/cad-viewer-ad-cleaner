		<div class="item-title">智能笔</div>
		<p><img src="../images/Smart Pen-001.png" alt="" width="28" height="28" /></p>
		<p>
			绘图 → 智能笔 </p>
		<p>
			操作步骤： </p>
		<p>步骤1：点击&ldquo;绘图&rdquo;按钮，选择&ldquo;智能笔&rdquo;工具。默认为连续绘制状态。随着手指在屏幕上移动，程序自动判断移动产生的轨迹，并生成相应的标准图形，例如直线，多段线，圆，圆弧等。连续模式下不支持对象捕捉。命令提示语后显示&ldquo;单独&rdquo;和&ldquo;✓&rdquo;两个关键字。
		</p>
		<p>
			步骤2：可点击&ldquo;单独&rdquo;按钮进入绘制单个对象的模式。手指在屏幕上移动的过程中，仅创建一个单独的实体，比如，直线，多段线，圆，圆弧等。单独模式下支持对象捕捉。命令提示语后显示&ldquo;连续&rdquo;和&ldquo;✓&rdquo;两个关键字。</p>
		<p>
			步骤3：点击&ldquo;✓&rdquo;确认输入。</p>
