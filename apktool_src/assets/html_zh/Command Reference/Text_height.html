		<p><img src="../images/Text_height.png" alt="" width="28" height="28" /></p>
		<p>编辑 → 字高</p>
		<p>功能说明：支持修改选定文字的字高，调整字体大小。</p>
<p>操作步骤： </p>
		<p>步骤1：在图纸区选择一个或多个文字对象，文字对象包括单行文字，多行文字，属性定义，和标注文字。</p>
	<p> 步骤2：在编辑菜单中，点击&ldquo;字高&rdquo;；</p>
	<p>步骤3：在&ldquo;修改字高&rdquo;面板中，展示已选中文字的字高，点击可修改；也可通过&ldquo;字高匹配&rdquo;功能将选定文字的字高匹配为图纸中指定文字的字高。</p>
