	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">图片</li>
			</ul>
		</div>
		<div class="item-title">图片</div>
		<p><img src="../images/Annotation_image.png" alt="" width="28" height="28" /></p>
		<p>批注 → 图片 </p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：点击&ldquo;批注&rdquo;按钮，选择&ldquo;图片&rdquo;工具;</p>
		<p>
			步骤2：点击屏幕指定一点放置图片批注。 </p>
		<p>
			步骤3：支持使用水印相机拍照，使用系统相机拍照或从相册选择照片添加到图纸里，最多可选十张，点击&ldquo;确定&rdquo;。</p>
		<p>
			步骤4：进入图片列表页，点击图片可以看大图，可以继续添加图片（如未满10张），可以替换图片，可以删除刚才添加的图片，可以在大图页面添加备注。</p>
		<p>
			步骤5：点击&ldquo;确定&rdquo;完成。 </p>


		

	</body>
</html>
