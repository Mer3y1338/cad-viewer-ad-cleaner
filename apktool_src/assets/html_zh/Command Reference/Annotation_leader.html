		<p><img src="../images/Annotation_leader.png" alt="" width="28" height="28" /></p>
		<p>批注 → 引线 </p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：点击&ldquo;批注&rdquo;按钮，选择&ldquo;引线&rdquo;工具;</p>
		<p>
			步骤2：在屏幕上点击指定引线起点。 </p>
		<p>
			步骤3：在屏幕上点击选择文本框位置。</p>
		<p>
			步骤4：在弹出的输入框中输入文字内容，可输入多行文字，可换行。 </p>
		<p>
			步骤5：点击确定按钮，结束文字命令。 </p>
