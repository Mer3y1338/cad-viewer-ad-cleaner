		<div class="item-title">云线</div>
		<p><img src="../images/Annotation_revcloud.png" alt="" width="28" height="28" /></p>
		<p>批注 → 云线 </p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：点击&ldquo;批注&rdquo;按钮，选择&ldquo;云线&rdquo;工具;</p>
		<p>
			步骤2：单击指定云线起点，且手指不离开屏幕，拖动手指确定云线的其它顶点，拖动手指时，会自动拾取云线的各个顶点。 </p>
		<p>
			步骤3：重复步骤2，可连续绘制云线。</p>
		<p>
			步骤4：点击&ldquo;✓&rdquo;确认，结束绘制。 </p>
