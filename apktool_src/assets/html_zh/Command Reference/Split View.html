<!DOCTYPE html>
<html>
	<head>
		<title>多图查看</title>
		<meta charset="utf-8">
		<meta http-equiv="x-ua-compatible" content="ie=edge">

	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">多图查看</li>
			</ul>
		</div>
		<div class="item-title">多图查看</div>
		<p><img src="../images/Split_view.png" alt="" width="28" height="28" /></p>
		
		<p>功能描述：多图查看支持同时打开并查看两张图纸，上下对比查看，支持两个视口单独平移或缩放。
        </p><p>
			操作步骤： </p>
		<p>
			步骤1：点击&ldquo;多图查看&rdquo;按钮；</p>
		<p>
			步骤2：确认已知晓执行多图查看的风险（同时查看两张图纸将占用较多内存，多图查看会有运行内存不足导致程序闪退的风险）；</p>
		<p>
			步骤3：选择要打开的第二张图；</p>
		<p>
			步骤4：若第二张图成功打开，则上下两个视口分别显示；可以上下两张图对比查看，分别缩放或平移。
若第二张图打开失败，则看图王将闪退。</p>
		



	</body>
</html>
