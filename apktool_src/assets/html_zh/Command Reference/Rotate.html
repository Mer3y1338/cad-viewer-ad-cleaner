		<p><img src="../images/Rotate-001.png" alt="" width="28" height="28" /></p>
		<p>
			编辑 → 旋转 </p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：单击选择要旋转的实体。</p>
		<p>
			步骤2：选择&ldquo;旋转&rdquo;按钮。 </p>
		<p>
			步骤3：单击或拖动指定一点为旋转的基点。 </p>
		<p>
			步骤4：调整当前点或指定旋转角度。 </p>
		<p>
			步骤5：调整旋转角度或确认输入。旋转任务完成。 </p>
<p>说明：新增了旋转副本的功能，即在旋转时可以旋转选定对象，也可以在保持选定对象不变的基础上旋转副本。</p>
