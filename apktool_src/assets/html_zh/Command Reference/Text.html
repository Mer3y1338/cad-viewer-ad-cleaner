		<div class="item-title">文字</div>
		<p><img src="../images/Text-001.png" alt="" width="28" height="28" /></p>
		<p>
			绘图 → 文字 </p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：点击&ldquo;绘图&rdquo;按钮，选择&ldquo;文字&rdquo;命令。</p>
		<p>
			步骤2：在屏幕上点击或拖动指定文字输入的起点。 </p>
		<p>步骤3：在弹出的输入框中输入文字内容，可输入多行文字，文字可换行。<br>
	说明：点击&ldquo;字高设置&rdquo;图标，支持修改字高。字高默认为自适应屏幕，可切换为自定义字高。自定义字高时，支持手动输入字高值，也可通过&ldquo;字高匹配&rdquo;功能将字高匹配为图纸中指定文字的字高。</p>
<p>步骤4：点击确定按钮，结束文字命令。 </p>
