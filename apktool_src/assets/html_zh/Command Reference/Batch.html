		<p><img src="../images/Batch.png" alt="" width="28" height="28" /></p>
		<p>
			测量 → 批量测线 </p>
		<p>功能描述：通过在图纸里选择一条线段，快速统计出与该线段属性一致的线段总长。</p>
	  <p>操作步骤： <br>
	  步骤1：点击工具条上的&ldquo;测量&rdquo;按钮，弹出的面板上选择&ldquo;批量测线&rdquo;命令。<br>
	  步骤2：在图纸里点击选择要测总长的其中一条线段。<br>
	  即可在览图区看到所有满足条件的线段都高亮显示了，不满足条件的线变暗显示。在面板上可看到总长值。如果需要统计其他线段，可点击“重选”重新选择要统计的线段。</p>
	 
                <p>筛选条件：默认按图层名一致筛选，支持按图层名一致，颜色一致，类型一致多条件筛选。默认统计范围为全图，支持定义窗口范围。</p>
