<!DOCTYPE html>
<html>
	<head>
		<title>新建图块</title>
		<meta charset="utf-8">
		<meta http-equiv="x-ua-compatible" content="ie=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<link rel="stylesheet" type="text/css" href="../menu.css" />
		<script type="text/javascript" src="../common.js"></script>
	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">新建图块</li>
			</ul>
		</div>
		<div class="item-title">新建图块</div>

		<p>
			编辑菜单 → 新建图块 </p>
		<p>
			新建图块：支持把选定图形组合成图块。</p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：选择一个或多个对象； </p>
		<p>
			步骤2：在编辑菜单里点击&ldquo;新建图块&rdquo;； </p>
		<p>
			步骤3：指定图块名称； </p>
<p>
			步骤4：指定完图块名称后，点击&ldquo;确定&rdquo;则提示：指定插入基点。在图纸上指定图块的插入基点。</p>
		<p>
			步骤5：指定完插入基点后，则创建图块完成。 </p>
<p>
			说明：若选择的对象中包含属性定义，则会在选择对象完成后指定属性值。</p>
		

	</body>
</html>
