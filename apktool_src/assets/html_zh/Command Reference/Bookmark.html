		<p>
			<img src="../images/Bookmark.png" alt="" width="28" height="28" /></p>
		<p><strong>功能说明：</strong><br />
			可将需要经常浏览的视图界面添加到书签。<br />
			在书签列表中，点击该书签名称即可快速切换到该视图。<br />
			启动书签命令后，默认为&ldquo;原始视图&rdquo;。<br />
			<strong>新建书签：</strong><br />
			点击&ldquo;新建书签&rdquo;可将当前视图添加到书签，可通过缩放和平移调整当前视图。<br />
			<strong>管理书签：</strong><br />
			（1）切换：点击书签名称可切换书签，绘图区显示选中书签的视图；<br />
			（2）重命名：可重命名书签；<br />
			（3）删除：删除书签。
		</p>
