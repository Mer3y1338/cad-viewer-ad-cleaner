	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">

				<li>&gt;</li>
				<li class="active">椭圆</li>
			</ul>
		</div>
		<div class="item-title">椭圆</div>

		<p><img src="../images/Ellipse.png" alt="" width="28" height="28" /></p>
		<p>绘图 → 椭圆</p>
		<p>
			操作步骤： </p>
		<p>
			步骤1：点击&ldquo;绘图&rdquo;按钮，选择&ldquo;椭圆&rdquo;工具;</p>
		<p>
			步骤2：在屏幕点击指定椭圆的第一条轴的第一个端点，手指抬起时拾取的点为所指定的点。 </p>
		<p>
	步骤3：根据命令提示指定该轴的第二个端点，点击面板上的&ldquo;√&rdquo;进入下一步。</p>
		<p>
			步骤4：根据命令提示在面板上输入椭圆的第二条轴的半轴长度。 </p>
<p>
			步骤5：点击面板上的&ldquo;√&rdquo;确定输入并结束命令。 </p>
