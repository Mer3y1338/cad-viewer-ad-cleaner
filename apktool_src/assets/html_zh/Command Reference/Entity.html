<p>测量  → 测实体</p>
<p>选实体测量命令简称为测实体。选择不同对象，显示不同结果。仅支持点击单选。支持循环测量，单次显示单个对象的测量结果。</p>
<p>直线：显示长度和角度。</p>
<p> 圆：显示半径和面积。</p>
<p>圆弧：显示半径，总角度，弧长，弦长。</p>
<p>多段线：显示面积和总长。</p>
<p>Tips: 可在结果框内长按，选择&ldquo;复制&rdquo;复制测量结果。 </p>
