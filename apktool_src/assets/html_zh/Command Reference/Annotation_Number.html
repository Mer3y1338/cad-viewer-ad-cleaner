<!DOCTYPE html>
<html>
	<head>
		<title>编号</title>
		<meta charset="utf-8">
		<meta http-equiv="x-ua-compatible" content="ie=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<link rel="stylesheet" type="text/css" href="../menu.css" />
		<script type="text/javascript" src="../common.js"></script>
	</head>
	<body>
		<div class="row breadcrumb-wrapper">
			<ul class="breadcrumb main-wrapper container">
				<li><a href="../link.html">帮助</a></li>
				<li>&gt;</li>
				<li class="active">编号</li>
			</ul>
		</div>
		<div class="item-title">编号</div>
		<p><img src="../images/Annotation_number.png" alt="" width="28" height="28" /></p>
		<p>批注 → 编号 </p>
		<p>
			<b>操作步骤： </b>
		</p>
		<p>
			步骤1：点击&ldquo;批注&rdquo;按钮，选择&ldquo;编号&rdquo;功能;</p>
		<p>
			步骤2：根据命令提示选择要编号的数字或字母； </p>
		<p>
			步骤3：在弹出框中勾选要变化的数字或字母；</p>
		<p>
			步骤4：在弹出框中点击&ldquo;确定&rdquo;生成递增的结果，在递增的结果上拖动平移图标调整文字放置位置； </p>
		<p>
			步骤5：点击下方面板中的&ldquo;下一个&rdquo;按钮，生成下一个递增的结果。 </p>
            <p>
			步骤6：点击&ldquo;×&rdquo;为放弃最后一次递增的结果并结束命令；点击&ldquo;√&rdquo;为确认最后一次递增的结果并结束命令。 </p>
		


		
		

	</body>
</html>
