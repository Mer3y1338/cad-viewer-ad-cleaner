		<p>
			操作步骤： </p>
		<p>
			步骤1：点击&ldquo;批注&rdquo;按钮，选择&ldquo;音频&rdquo;工具;</p>
		<p>
			步骤2：单点屏幕选择一点放置音频批注。 </p>

			步骤3：长按录音按钮开始录音，或右上角取消绘制。</p>
		<p>
			步骤4：长按录音，手指抬起结束录音，生成音频批注。 </p>
