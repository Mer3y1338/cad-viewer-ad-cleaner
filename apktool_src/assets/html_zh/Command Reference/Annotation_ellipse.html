		<div class="item-title">椭圆</div>

		<p><img src="../images/Annotation_ellipse.png" alt="" width="28" height="28" /></p>
		<p>批注 → 椭圆 </p>
		<p>
			<b>操作步骤</b>： </p>
		<p>
			步骤1：点击&ldquo;批注&rdquo;按钮，选择&ldquo;椭圆&rdquo;工具;</p>
		<p>
			步骤2：手指在屏幕上拖动，以拖动的轨迹的起点和终点连线作为对角线形成矩形，并以此矩形做外接椭圆。 </p>
		<p>
			步骤3：手指抬起时命令结束。</p>
