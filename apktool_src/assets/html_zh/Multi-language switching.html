			目前Android版本支持多种语言版本：简体中文，英语，法语，德语，日语，韩语，捷克语，斯洛伐克语，匈牙利，意大利语，西班牙语，葡萄牙语，波兰语，俄语，繁体中文和土耳其语。<br />
			无需安装其他程序，用户通过改变移动设备系统语言版本，实现软件中语言的自动切换。
