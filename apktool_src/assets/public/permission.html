    function creatPage(dataString) {
        var data = JSON.parse(dataString);

        div1=document.getElementById('div1')
        var content = ""

        for (module in data) {
            content += createModule(data[module])
        }

        div1.innerHTML=content
    }

    function createModule(module) {
        var tab= '<table border=1 width=500">'
        var content = "<div style=\"display: flex; align-items: center; margin-top: 30px; margin-bottom: 3px\"><div style=\"background-color: #4FBABF; width: 3px; height: 16px;\"> </div><a style = \"margin-left: 3px; color:#3C3C43; font-size:16px; font-weight: bold;\">" + module.title + "</a></div>"
        if (module.desc != null && module.desc.length > 0) {
            content += "<a style=\"color:#3C3C43; font-size:12px; font-weight: normal; margin-left: 7px;\">" + module.desc + "</a>"
        }
        content += "<table class=\"demo\" width=\"100%\" cellspacing=\"0\" style=\"border-collapse:collapse\"> \
                    <thead>\
                    <tr>"
        
        var columns = module.table.th.length
        var c_width = "" + 100/columns + "%"
        for (thIndex in module.table.th) {
            content += "<th width=\"" + c_width + "\" style=\"text-align: left\">" + module.table.th[thIndex] + "</th>"
        }

        content += "</tr> \
                    </thead> \
                    <tbody>"

        for (tdIndex in module.table.td) {
            content += "<tr>"
            for (rowIndex in module.table.td[tdIndex]) {
                content += "<td style=\"text-align: left\">"
                var item = module.table.td[tdIndex][rowIndex]
                if (item == "img:checkmark") {
                    content += "<img src=\"data:image/png;base64, " + checkmarkImageBase64 + "\" width=\"12\" height=\"9.5\"/>" + "</td>"
                } else {
                    content += item + "</td>"
                }
            }
            content += "</tr>"
        }

        content += "</tbody> \
                    </table>"

        return content
    }
