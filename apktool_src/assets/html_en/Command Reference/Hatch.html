<p><img src="../images/Hatch.png" alt="" width="28" height="28" /></p>

		<p>
			The Hatch function is used to hatch specified closed area.</p>
		<p>
			Operations: </p>
		<p>
			<strong>Step 1:</strong> Click &ldquo;Draw&rdquo;  and select&ldquo;Hatch&rdquo;;</p>
		<p>
			<strong>Step 2:</strong> Specify a point in a closed region.</p>
                                <p>
			<strong>Step 3:</strong>The closed region is hatched by current color. You could set color if necessary.</p>
