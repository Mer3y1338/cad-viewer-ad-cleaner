		<p>It could turn one layer off by selecting one object on it.<br />
			<strong>Operation steps:</strong><br />
			Step 1: start &ldquo;Layer Off&rdquo; command;<br />
			Step 2: select one object, the layer is turned off; and then you could select another object to turn off its layer.
			<br />
			Step 3: tap &ldquo;✓&rdquo; to end it.
