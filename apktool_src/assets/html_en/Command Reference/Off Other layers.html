		<p>It could turn off other layers except selected layer.<br />
			<strong>Operation steps:</strong><br />
			Step 1: start &ldquo;Off Other layers&rdquo; command;<br />
			Step 2: select one or more object;<br />
			Step 3: tap &ldquo;✓&rdquo; to end it. All layers are turned off except selected layers in step 2.
